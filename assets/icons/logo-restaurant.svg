<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img">
  <title>Restaurant Management</title>
  <defs>
    <linearGradient id="rs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1628"/>
      <stop offset="100%" stop-color="#0c0812"/>
    </linearGradient>
    <linearGradient id="rs-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5FBF"/>
      <stop offset="100%" stop-color="#2EE6A8"/>
    </linearGradient>
    <filter id="rs-sh" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="400" height="280" rx="22" fill="url(#rs-bg)"/>
  <rect x="20" y="20" width="360" height="240" rx="18" fill="none" stroke="#B8A9E8" stroke-width="1.25" opacity="0.35"/>

  <g filter="url(#rs-sh)">
    <rect x="56" y="56" width="288" height="168" rx="12" fill="#121018" stroke="#B8A9E8" stroke-width="1" opacity="0.5"/>
    <rect x="56" y="56" width="288" height="32" rx="12" fill="#1e1a28"/>
    <rect x="56" y="76" width="288" height="12" fill="#121018"/>
    <circle cx="80" cy="72" r="5" fill="#b85858" opacity="0.85"/>
    <circle cx="98" cy="72" r="5" fill="#c4a032" opacity="0.85"/>
    <circle cx="116" cy="72" r="5" fill="#4a8a5c" opacity="0.85"/>
    <text x="200" y="78" text-anchor="middle" fill="#b8aed0" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em">RMS DESKTOP</text>
  </g>

  <g fill="none" stroke="#B8A9E8" stroke-width="1.5" opacity="0.45">
    <rect x="76" y="108" width="48" height="40" rx="6"/>
    <rect x="136" y="108" width="48" height="40" rx="6"/>
    <rect x="196" y="108" width="48" height="40" rx="6"/>
    <rect x="256" y="108" width="48" height="40" rx="6"/>
    <rect x="76" y="160" width="48" height="40" rx="6"/>
    <rect x="136" y="160" width="48" height="40" rx="6"/>
    <rect x="196" y="160" width="48" height="40" rx="6"/>
    <rect x="256" y="160" width="48" height="40" rx="6"/>
  </g>

  <rect x="136" y="108" width="48" height="40" rx="8" fill="url(#rs-accent)" opacity="0.25" stroke="#2EE6A8" stroke-width="1.5"/>
  <rect x="256" y="160" width="48" height="40" rx="8" fill="#8B5FBF" opacity="0.2" stroke="#8B5FBF" stroke-width="1.5"/>

