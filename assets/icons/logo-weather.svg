<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img">
  <title>Weather app</title>
  <defs>
    <radialGradient id="w-sun" cx="35%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="35%" stop-color="#f0d890"/>
      <stop offset="70%" stop-color="#d4a84a"/>
      <stop offset="100%" stop-color="#a87830" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="w-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2235"/>
      <stop offset="50%" stop-color="#14101c"/>
      <stop offset="100%" stop-color="#0e1218"/>
    </linearGradient>
    <linearGradient id="w-cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a5a78"/>
      <stop offset="100%" stop-color="#2a3348"/>
    </linearGradient>
    <filter id="w-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="w-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="280" rx="22" fill="url(#w-bg)"/>
  <rect x="20" y="20" width="360" height="240" rx="18" fill="none" stroke="#B8A9E8" stroke-width="1.25" opacity="0.35"/>

  <circle cx="128" cy="88" r="72" fill="url(#w-sun)" opacity="0.9" filter="url(#w-glow)"/>

  <g filter="url(#w-blur)" opacity="0.85">
    <ellipse cx="220" cy="168" rx="98" ry="44" fill="url(#w-cloud)" opacity="0.9"/>
    <ellipse cx="160" cy="152" rx="56" ry="36" fill="#3d4a62" opacity="0.95"/>
    <ellipse cx="268" cy="156" rx="52" ry="32" fill="#354258" opacity="0.9"/>
  </g>
  <g fill="url(#w-cloud)" stroke="#B8A9E8" stroke-width="1" stroke-opacity="0.25">
    <ellipse cx="220" cy="168" rx="98" ry="44"/>
    <ellipse cx="160" cy="152" rx="56" ry="36"/>
    <ellipse cx="268" cy="156" rx="52" ry="32"/>
  </g>

  <path d="M72 214h256" stroke="#7dd4bd" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <g fill="none" stroke="#7dd4bd" stroke-width="2" stroke-linecap="round" opacity="0.75">
    <path d="M88 200v-18M104 200v-28M120 200v-12"/>
    <path d="M280 200v-22M296 200v-14M312 200v-26"/>
  </g>
  <text x="200" y="248" text-anchor="middle" fill="#9a8bb8" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="700" letter-spacing="0.4em">FORECAST</text>
</svg>
