<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img">
  <title>Web calculator</title>
  <defs>
    <linearGradient id="calc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1828"/>
      <stop offset="100%" stop-color="#0e0c14"/>
    </linearGradient>
    <linearGradient id="calc-disp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3848"/>
      <stop offset="100%" stop-color="#141a22"/>
    </linearGradient>
    <linearGradient id="calc-key" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#353048"/>
      <stop offset="100%" stop-color="#221c30"/>
    </linearGradient>
    <linearGradient id="calc-eq" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd4bd"/>
      <stop offset="100%" stop-color="#3a8a70"/>
    </linearGradient>
    <filter id="calc-inset">
      <feDropShadow dx="0" dy="2" stdDeviation="0" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="280" rx="22" fill="url(#calc-bg)"/>
  <rect x="20" y="20" width="360" height="240" rx="18" fill="none" stroke="#B8A9E8" stroke-width="1.25" opacity="0.35"/>

  <rect x="64" y="48" width="272" height="56" rx="12" fill="url(#calc-disp)" stroke="#B8A9E8" stroke-width="1" stroke-opacity="0.25"/>
  <text x="312" y="86" text-anchor="end" fill="#7dd4bd" font-family="Consolas,monospace" font-size="28" font-weight="600" letter-spacing="0.08em">1337</text>
  <text x="312" y="58" text-anchor="end" fill="#5a6a78" font-family="Consolas,monospace" font-size="11">CALC</text>

  <g fill="url(#calc-key)" stroke="#B8A9E8" stroke-width="0.75" stroke-opacity="0.2">
    <rect x="64" y="120" width="56" height="40" rx="8"/><rect x="128" y="120" width="56" height="40" rx="8"/>
    <rect x="192" y="120" width="56" height="40" rx="8"/><rect x="256" y="120" width="56" height="40" rx="8"/>
    <rect x="64" y="168" width="56" height="40" rx="8"/><rect x="128" y="168" width="56" height="40" rx="8"/>
    <rect x="192" y="168" width="56" height="40" rx="8"/>
  </g>
  <g fill="#a098b8" font-family="Consolas,monospace" font-size="16" font-weight="600" text-anchor="middle">
    <text x="92" y="146">7</text><text x="156" y="146">8</text><text x="220" y="146">9</text><text x="284" y="146">/</text>
    <text x="92" y="194">4</text><text x="156" y="194">5</text><text x="220" y="194">6</text>
  </g>
  <rect x="256" y="120" width="80" height="88" rx="10" fill="url(#calc-eq)" stroke="#9ef0d8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="296" y="182" text-anchor="middle" fill="#0a1814" font-family="system-ui,Segoe UI,sans-serif" font-size="22" font-weight="800">=</text>
</svg>
